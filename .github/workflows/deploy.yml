name: Deploy Serverless Backend

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    outputs:
      api-url: ${{ steps.get-url.outputs.url }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24 # Use the Node.js version your app requires

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: backend

      # Step 4: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 5: Deploy using Serverless Framework and capture output
      - name: Deploy to AWS
        run: npm run deploy:${{ github.ref_name == 'main' && 'prod' || 'dev' }} 2>&1 | tee deploy-output.txt
        working-directory: backend
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      # Step 6: Extract the API Gateway base URL from deploy output
      - name: Extract API URL
        id: get-url
        run: |
          URL=$(grep -oE 'https://[^/]+\.amazonaws\.com' backend/deploy-output.txt | head -1)
          echo "Extracted API URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # Step 3: Resolve Vercel environment flags based on the branch
      - name: Set Vercel environment flags
        id: vercel-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "prod-flag=--prod" >> $GITHUB_OUTPUT
          else
            echo "environment=preview" >> $GITHUB_OUTPUT
            echo "prod-flag=" >> $GITHUB_OUTPUT
          fi

      # Step 4: Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Step 5: Pull Vercel project settings and environment info
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.vercel-env.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Step 6: Build the project, injecting the dynamic backend URL captured from the deploy-backend job
      - name: Build with Vercel
        run: vercel build ${{ steps.vercel-env.outputs.prod-flag }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api-url }}
          VITE_DUMMY_USER_ID: ${{ secrets.VITE_DUMMY_USER_ID }}

      # Step 7: Deploy the pre-built output to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt ${{ steps.vercel-env.outputs.prod-flag }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
