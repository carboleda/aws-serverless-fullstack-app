name: Deploy Serverless Backend

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    outputs:
      api-url: ${{ steps.get-url.outputs.url }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24 # Use the Node.js version your app requires

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: backend

      # Step 4: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 5: Deploy using Serverless Framework and capture output
      - name: Deploy to AWS
        run: npm run deploy:${{ github.ref_name == 'main' && 'prod' || 'dev' }} 2>&1 | tee deploy-output.txt
        working-directory: backend
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      # Step 6: Extract the API Gateway base URL from deploy output
      - name: Extract API URL
        id: get-url
        run: |
          URL=$(grep -oE 'https://[^/]+\.amazonaws\.com' backend/deploy-output.txt | head -1)
          echo "Extracted API URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # Step 3: Build the frontend locally so VITE_API_URL (dynamic output from
      # the backend job) can be injected at build time. amondnet/vercel-action
      # deploys the pre-built dist/ folder, so Vercel's own build step is skipped.
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api-url }}
          VITE_DUMMY_USER_ID: ${{ secrets.VITE_DUMMY_USER_ID }}

      # Step 4: Deploy the pre-built output to Vercel.
      - name: Deploy to Vercel (main)
        if: github.ref_name == 'main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend
          alias-domains: guru-finance.calabs.dev
          github-comment: false

      - name: Deploy to Vercel (dev)
        if: github.ref_name == 'dev'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          alias-domains: preview.guru-finance.calabs.dev
          github-comment: false
