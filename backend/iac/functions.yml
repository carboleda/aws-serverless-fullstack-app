# functions
getAllTransactions:
  handler: src/entrypoints/transactions/handlers.getAll
  events:
    - httpApi:
        path: "/transactions"
        method: "get"

getTransaction:
  handler: src/entrypoints/transactions/handlers.get
  events:
    - httpApi:
        path: "/transactions/{id}"
        method: "get"

createTransaction:
  handler: src/entrypoints/transactions/handlers.create
  events:
    - httpApi:
        path: "/transactions"
        method: "post"

updateTransaction:
  handler: src/entrypoints/transactions/handlers.update
  events:
    - httpApi:
        path: "/transactions/{id}"
        method: "put"

deleteTransaction:
  handler: src/entrypoints/transactions/handlers.remove
  events:
    - httpApi:
        path: "/transactions/{id}"
        method: "delete"
